<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockton Track - Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">
            <h1>Lockton Track</h1>
            <p>The Intelligent Travel Companion</p>
        </div>
        <h2>Create Account</h2>
        <div id="error-message" class="error-message hidden"></div>
        <div id="success-message" class="success-message hidden"></div>
        <input id="email" type="email" placeholder="Email" autocomplete="email">
        <input id="password" type="password" placeholder="Password (min 6 characters)" autocomplete="new-password">
        <button id="register-button">Create Account</button>
        <p class="auth-link">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
    <script>
        async function handleRegister() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            const successEl = document.getElementById('success-message');
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                successEl.textContent = 'Account created! Redirecting to sign in...';
                successEl.classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                errorEl.textContent = data.error || 'Registration failed.';
                errorEl.classList.remove('hidden');
            }
        }

        document.getElementById('register-button').addEventListener('click', handleRegister);
        document.getElementById('password').addEventListener('keypress', e => {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>
</html>
