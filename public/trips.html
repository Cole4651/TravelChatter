<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - Travel Chatter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <nav class="nav">
        <a href="index.html" class="nav-brand">Travel Chatter</a>
        <div class="nav-links">
            <a href="trips.html">My Trips</a>
            <span class="nav-user" id="auth-status"></span>
            <button id="logout-button" class="secondary-button">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-heading">
            <h1>My Trips</h1>
            <p>Organize every trip and chat with your AI copilot for each one.</p>
        </div>

        <div class="globe-wrapper">
            <div id="globe-container"></div>
            <div class="globe-hint" id="globe-hint">Click a trip below to fly there</div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Your trips</h2>
            <a href="new-trip.html" class="btn-primary btn-sm">+ New Trip</a>
        </div>

        <div id="trips-list" class="trips-list"></div>
        <div id="trips-empty" class="empty-state hidden">
            <p>No trips yet. <a href="new-trip.html">Create your first one →</a></p>
        </div>
    </div>

    <script src="https://unpkg.com/globe.gl"></script>
    <script>
        const token = localStorage.getItem('authToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        const authHeaders = { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };

        document.getElementById('logout-button').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            window.location.href = 'login.html';
        });

        fetch('/me', { headers: { Authorization: `Bearer ${token}` } })
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    localStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('auth-status').textContent = data.email;
            });

        function formatDateRange(start, end) {
            if (!start && !end) return '';
            const fmt = d => d ? new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
            if (start && end) return `${fmt(start)} — ${fmt(end)}`;
            return fmt(start || end);
        }

        function statusLabel(status) {
            return { planning: 'Planning', approval: 'Approval', travel: 'Traveling', post: 'Post-Trip' }[status] || status;
        }

        let globe = null;
        let pendingPoints = null;

        function initGlobe() {
            if (globe) return;
            if (typeof Globe === 'undefined') {
                setTimeout(initGlobe, 100);
                return;
            }
            const container = document.getElementById('globe-container');
            globe = Globe()
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .backgroundColor('rgba(0,0,0,0)')
                .atmosphereColor('#6366f1')
                .atmosphereAltitude(0.18)
                .showGraticules(false)
                .pointLat('lat')
                .pointLng('lng')
                .pointColor(() => '#a855f7')
                .pointAltitude(0.015)
                .pointRadius(0.6)
                .pointLabel(d => `<div class="globe-label">${d.name}${d.destination ? ' — ' + d.destination : ''}</div>`)
                .ringLat('lat')
                .ringLng('lng')
                .ringColor(() => t => `rgba(168, 85, 247, ${1 - t})`)
                .ringMaxRadius(3.5)
                .ringPropagationSpeed(2)
                .ringRepeatPeriod(1400)
                .width(container.clientWidth)
                .height(420)
                (container);

            globe.pointOfView({ lat: 25, lng: 0, altitude: 2.3 });
            const controls = globe.controls();
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;
            controls.enableZoom = false;

            window.addEventListener('resize', () => {
                globe.width(container.clientWidth);
            });

            if (pendingPoints) {
                globe.pointsData(pendingPoints);
                globe.ringsData(pendingPoints);
                pendingPoints = null;
            }
        }

        function setGlobePoints(points) {
            if (globe) {
                globe.pointsData(points);
                globe.ringsData(points);
            } else {
                pendingPoints = points;
            }
        }

        function flyTo(trip) {
            if (!globe || trip.latitude == null || trip.longitude == null) return;
            globe.controls().autoRotate = false;
            globe.pointOfView(
                { lat: trip.latitude, lng: trip.longitude, altitude: 1.3 },
                1200
            );
        }

        async function loadTrips() {
            const res = await fetch('/api/trips', { headers: authHeaders });
            const data = await res.json();
            const list = document.getElementById('trips-list');
            const empty = document.getElementById('trips-empty');
            list.innerHTML = '';

            const hint = document.getElementById('globe-hint');

            if (!data.trips || data.trips.length === 0) {
                empty.classList.remove('hidden');
                setGlobePoints([]);
                hint.textContent = 'Create your first trip to see it here';
                return;
            }
            empty.classList.add('hidden');

            const geocoded = data.trips.filter(t => t.latitude != null && t.longitude != null);
            const points = geocoded.map(t => ({
                lat: t.latitude,
                lng: t.longitude,
                name: t.name,
                destination: t.destination,
                id: t._id,
            }));
            setGlobePoints(points);

            if (points.length === 0) {
                hint.textContent = 'Set a specific destination (e.g. "Tokyo, Japan") to pin it';
            } else {
                hint.textContent = 'Click a trip below to fly there';
            }

            data.trips.forEach(trip => {
                const card = document.createElement('a');
                card.className = 'trip-card';
                card.href = `trip.html?id=${trip._id}`;
                card.innerHTML = `
                    <div class="trip-card-header">
                        <h3>${escapeHtml(trip.name)}</h3>
                        <span class="status-pill status-${trip.status}">${statusLabel(trip.status)}</span>
                    </div>
                    ${trip.destination ? `<p class="trip-destination">${escapeHtml(trip.destination)}</p>` : ''}
                    ${(trip.startDate || trip.endDate) ? `<p class="trip-dates">${formatDateRange(trip.startDate, trip.endDate)}</p>` : ''}
                    ${trip.purpose ? `<p class="trip-purpose">${escapeHtml(trip.purpose)}</p>` : ''}
                `;
                card.addEventListener('click', (e) => {
                    if (trip.latitude == null) return;
                    e.preventDefault();
                    flyTo(trip);
                    setTimeout(() => { window.location.href = card.href; }, 1100);
                });
                list.appendChild(card);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        initGlobe();
        loadTrips();
    </script>
</body>
</html>
