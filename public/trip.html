<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip - Travel Chatter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <nav class="nav">
        <a href="index.html" class="nav-brand">Travel Chatter</a>
        <div class="nav-links">
            <a href="trips.html">My Trips</a>
            <span class="nav-user" id="auth-status"></span>
            <button id="logout-button" class="secondary-button">Logout</button>
        </div>
    </nav>

    <div class="container container-wide">
        <a href="trips.html" class="back-link">← All trips</a>

        <div class="trip-header">
            <div>
                <h1 id="trip-name"></h1>
                <p class="trip-meta" id="trip-meta"></p>
            </div>
            <div class="trip-header-actions">
                <a id="explore-link" href="#" class="btn-primary btn-sm">Discover things to do</a>
                <a id="members-link" href="#" class="btn-secondary btn-sm">Members</a>
                <label class="status-field" id="status-field">
                    <span class="status-field-label">Stage:</span>
                    <select id="trip-status" class="status-select">
                        <option value="planning">Planning</option>
                        <option value="approval">Approval</option>
                        <option value="travel">Traveling</option>
                        <option value="post">Post-Trip</option>
                    </select>
                </label>
                <button id="delete-trip" class="danger-button">Delete</button>
            </div>
        </div>

        <div class="trip-people" id="trip-people"></div>

        <div class="card requests-card hidden" id="requests-card">
            <h3 class="card-title">Pending requests</h3>
            <div id="requests-list" class="requests-list"></div>
        </div>

        <div class="card wishlist-card hidden" id="wishlist-card">
            <h3 class="card-title">Wishlist</h3>
            <div id="wishlist-list" class="wishlist-list"></div>
        </div>

        <div class="trip-layout">
            <section class="trip-col">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title" id="itinerary-heading">Itinerary</h3>
                        <button id="toggle-add-item" class="btn-primary btn-sm">+ Add item</button>
                    </div>
                    <div id="itinerary-list" class="itinerary-list"></div>
                    <div id="itinerary-empty" class="empty-state hidden">
                        <p id="itinerary-empty-text">No items yet. Click + Add item above.</p>
                    </div>
                </div>

                <div class="card hidden" id="add-item-card">
                    <div class="card-header">
                        <h3 class="card-title" id="add-item-heading">Add to itinerary</h3>
                        <button id="cancel-add-item" class="secondary-button btn-sm">Cancel</button>
                    </div>
                    <div class="form-grid">
                        <input id="item-title" type="text" placeholder="Title (e.g. Flight to LHR)">
                        <select id="item-type">
                            <option value="flight">Flight</option>
                            <option value="hotel">Hotel</option>
                            <option value="meeting">Meeting</option>
                            <option value="activity">Activity</option>
                            <option value="other">Other</option>
                        </select>
                        <input id="item-date" type="date">
                        <input id="item-time" type="time">
                        <input id="item-location" type="text" placeholder="Location" class="full-width">
                        <input id="item-notes" type="text" placeholder="Notes (optional)" class="full-width">
                    </div>
                    <div class="form-actions">
                        <button id="add-item-button">Add to itinerary</button>
                    </div>
                    <p id="request-note" class="form-note hidden">You're a collaborator, so items are submitted as requests for the trip owner to approve.</p>
                </div>
            </section>

            <section class="trip-col">
                <div class="card chat-card">
                    <h3 class="card-title">Trip Chat</h3>
                    <div class="chat-container chat-container-inline">
                        <div id="chat-messages"></div>
                        <div class="input-container">
                            <input type="text" id="message-input" placeholder="Ask about this trip...">
                            <button id="send-button">Send</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('authToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('id');
        if (!tripId) {
            window.location.href = 'trips.html';
        }

        const authHeaders = { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };

        document.getElementById('logout-button').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            window.location.href = 'login.html';
        });

        fetch('/me', { headers: { Authorization: `Bearer ${token}` } })
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    localStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('auth-status').textContent = data.email;
            });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str == null ? '' : String(str);
            return div.innerHTML;
        }

        function formatDateRange(start, end) {
            const fmt = d => d ? new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
            if (start && end) return `${fmt(start)} — ${fmt(end)}`;
            return fmt(start || end);
        }

        let isOwner = false;

        function renderTrip(trip) {
            document.getElementById('trip-name').textContent = trip.name;
            const metaParts = [];
            if (trip.destination) metaParts.push(trip.destination);
            const dates = formatDateRange(trip.startDate, trip.endDate);
            if (dates) metaParts.push(dates);
            if (trip.purpose) metaParts.push(trip.purpose);
            document.getElementById('trip-meta').textContent = metaParts.join(' • ');
            const statusEl = document.getElementById('trip-status');
            statusEl.value = trip.status;
            applyStatusColor(statusEl, trip.status);
            document.getElementById('explore-link').href = `explore.html?id=${trip._id}`;
            document.getElementById('members-link').href = `trip-members.html?id=${trip._id}`;

            applyRoleUI();
            renderPeople(trip);
            renderRequests(trip.itineraryRequests || []);
            renderItinerary(trip.itinerary || []);
            renderWishlist(trip.wishlist || []);
        }

        function applyRoleUI() {
            const deleteBtn = document.getElementById('delete-trip');
            const statusField = document.getElementById('status-field');
            const addBtn = document.getElementById('add-item-button');
            const toggleBtn = document.getElementById('toggle-add-item');
            const addHeading = document.getElementById('add-item-heading');
            const emptyText = document.getElementById('itinerary-empty-text');
            const requestNote = document.getElementById('request-note');

            if (isOwner) {
                deleteBtn.classList.remove('hidden');
                statusField.classList.remove('hidden');
                addBtn.textContent = 'Add to itinerary';
                toggleBtn.textContent = '+ Add item';
                addHeading.textContent = 'Add to itinerary';
                emptyText.textContent = 'No items yet. Click + Add item above.';
                requestNote.classList.add('hidden');
            } else {
                deleteBtn.classList.add('hidden');
                statusField.classList.add('hidden');
                addBtn.textContent = 'Submit request';
                toggleBtn.textContent = '+ Suggest item';
                addHeading.textContent = 'Suggest an itinerary item';
                emptyText.textContent = 'No items yet. Click + Suggest item above.';
                requestNote.classList.remove('hidden');
            }
        }

        function renderPeople(trip) {
            const container = document.getElementById('trip-people');
            container.innerHTML = '';
            const count = 1 + (trip.members || []).length;
            const label = document.createElement('span');
            label.className = 'trip-people-label';
            label.textContent = `${count} ${count === 1 ? 'person' : 'people'} on this trip`;
            container.appendChild(label);

            const pill = document.createElement('span');
            pill.className = 'role-pill';
            pill.textContent = isOwner ? 'You are the owner' : 'You are a collaborator';
            container.appendChild(pill);

            const link = document.createElement('a');
            link.className = 'trip-people-link';
            link.href = `trip-members.html?id=${trip._id}`;
            link.textContent = isOwner ? 'Manage →' : 'View →';
            container.appendChild(link);
        }

        function renderRequests(requests) {
            const card = document.getElementById('requests-card');
            const list = document.getElementById('requests-list');
            if (!isOwner || !requests.length) {
                card.classList.add('hidden');
                return;
            }
            card.classList.remove('hidden');
            list.innerHTML = '';
            requests.forEach(r => {
                const div = document.createElement('div');
                div.className = 'request-item';
                const dateStr = r.date ? new Date(r.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';
                div.innerHTML = `
                    <div class="request-item-body">
                        <div class="request-item-head">
                            <span class="itinerary-item-type type-${escapeHtml(r.type)}">${escapeHtml(r.type)}</span>
                            <span class="request-item-title">${escapeHtml(r.title)}</span>
                        </div>
                        <div class="request-item-meta">
                            ${dateStr ? `<span>${dateStr}</span>` : ''}
                            ${r.time ? `<span>${escapeHtml(r.time)}</span>` : ''}
                            ${r.location ? `<span>${escapeHtml(r.location)}</span>` : ''}
                        </div>
                        ${r.notes ? `<div class="request-item-notes">${escapeHtml(r.notes)}</div>` : ''}
                        <div class="request-item-from">Suggested by ${escapeHtml(r.proposedByEmail)}</div>
                    </div>
                    <div class="request-actions">
                        <button class="btn-sm approve-btn">Approve</button>
                        <button class="btn-sm reject-btn danger-button">Reject</button>
                    </div>
                `;
                div.querySelector('.approve-btn').addEventListener('click', () => decideRequest(r._id, 'approve'));
                div.querySelector('.reject-btn').addEventListener('click', () => decideRequest(r._id, 'reject'));
                list.appendChild(div);
            });
        }

        async function decideRequest(requestId, action) {
            const res = await fetch(`/api/trips/${tripId}/requests/${requestId}/${action}`, {
                method: 'POST',
                headers: authHeaders,
            });
            const data = await res.json();
            if (data.success) {
                renderRequests(data.trip.itineraryRequests || []);
                renderItinerary(data.trip.itinerary || []);
            }
        }

        function renderWishlist(items) {
            const card = document.getElementById('wishlist-card');
            const list = document.getElementById('wishlist-list');
            if (!items.length) {
                card.classList.add('hidden');
                return;
            }
            card.classList.remove('hidden');
            list.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'wishlist-item';
                div.innerHTML = `
                    <div class="wishlist-item-body">
                        <div class="wishlist-item-title">${escapeHtml(item.title)}</div>
                        <div class="wishlist-item-meta">
                            ${item.type ? `<span class="wishlist-item-type type-${escapeHtml(item.type)}">${escapeHtml(item.type)}</span>` : ''}
                            ${item.location ? `<span>${escapeHtml(item.location)}</span>` : ''}
                        </div>
                        ${item.description ? `<div class="wishlist-item-description">${escapeHtml(item.description)}</div>` : ''}
                    </div>
                    <button class="icon-button" data-id="${item._id}" title="Remove">×</button>
                `;
                div.querySelector('button').addEventListener('click', () => removeWishlistItem(item._id));
                list.appendChild(div);
            });
        }

        async function removeWishlistItem(itemId) {
            const res = await fetch(`/api/trips/${tripId}/wishlist/${itemId}`, {
                method: 'DELETE',
                headers: authHeaders,
            });
            const data = await res.json();
            if (data.success) renderWishlist(data.trip.wishlist || []);
        }

        function renderItinerary(items) {
            const list = document.getElementById('itinerary-list');
            const empty = document.getElementById('itinerary-empty');
            list.innerHTML = '';
            if (items.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const sorted = [...items].sort((a, b) => {
                const da = a.date ? new Date(a.date).getTime() : Infinity;
                const db = b.date ? new Date(b.date).getTime() : Infinity;
                return da - db;
            });

            sorted.forEach(item => {
                const div = document.createElement('div');
                div.className = 'itinerary-item';
                const dateStr = item.date ? new Date(item.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';
                const timeStr = item.time || '';
                div.innerHTML = `
                    <div class="itinerary-item-type type-${item.type}">${escapeHtml(item.type)}</div>
                    <div class="itinerary-item-body">
                        <div class="itinerary-item-title">${escapeHtml(item.title)}</div>
                        <div class="itinerary-item-meta">
                            ${dateStr ? `<span>${dateStr}</span>` : ''}
                            ${timeStr ? `<span>${escapeHtml(timeStr)}</span>` : ''}
                            ${item.location ? `<span>${escapeHtml(item.location)}</span>` : ''}
                        </div>
                        ${item.notes ? `<div class="itinerary-item-notes">${escapeHtml(item.notes)}</div>` : ''}
                    </div>
                    <button class="icon-button" data-id="${item._id}" title="Remove">×</button>
                `;
                div.querySelector('button').addEventListener('click', () => removeItem(item._id));
                list.appendChild(div);
            });
        }

        async function loadTrip() {
            const res = await fetch(`/api/trips/${tripId}`, { headers: authHeaders });
            const data = await res.json();
            if (!data.success) {
                window.location.href = 'trips.html';
                return;
            }
            isOwner = !!data.isOwner;
            renderTrip(data.trip);
        }

        async function loadMessages() {
            const res = await fetch(`/api/trips/${tripId}/messages`, { headers: authHeaders });
            const data = await res.json();
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            if (!data.messages || data.messages.length === 0) {
                addMessage("Hi! Ask me anything about this trip — I've got the itinerary and details in context.", false);
                return;
            }
            data.messages.forEach(m => addMessage(m.content, m.role === 'user'));
        }

        function addMessage(content, isUser) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            div.textContent = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function applyStatusColor(selectEl, status) {
            ['planning', 'approval', 'travel', 'post'].forEach(s => {
                selectEl.classList.remove(`status-${s}`);
            });
            selectEl.classList.add(`status-${status}`);
        }

        document.getElementById('trip-status').addEventListener('change', async (e) => {
            applyStatusColor(e.target, e.target.value);
            await fetch(`/api/trips/${tripId}`, {
                method: 'PATCH',
                headers: authHeaders,
                body: JSON.stringify({ status: e.target.value }),
            });
        });

        document.getElementById('delete-trip').addEventListener('click', async () => {
            if (!confirm('Delete this trip and all its chat history?')) return;
            const res = await fetch(`/api/trips/${tripId}`, { method: 'DELETE', headers: authHeaders });
            const data = await res.json();
            if (data.success) window.location.href = 'trips.html';
        });

        const addItemCard = document.getElementById('add-item-card');
        const toggleAddItem = document.getElementById('toggle-add-item');

        function resetAddItemForm() {
            ['item-title', 'item-date', 'item-time', 'item-location', 'item-notes'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('item-type').value = 'flight';
        }

        function openAddItem() {
            addItemCard.classList.remove('hidden');
            toggleAddItem.classList.add('hidden');
            document.getElementById('item-title').focus();
        }

        function closeAddItem() {
            addItemCard.classList.add('hidden');
            toggleAddItem.classList.remove('hidden');
            resetAddItemForm();
        }

        toggleAddItem.addEventListener('click', openAddItem);
        document.getElementById('cancel-add-item').addEventListener('click', closeAddItem);

        document.getElementById('add-item-button').addEventListener('click', async () => {
            const body = {
                title: document.getElementById('item-title').value.trim(),
                type: document.getElementById('item-type').value,
                date: document.getElementById('item-date').value || null,
                time: document.getElementById('item-time').value || '',
                location: document.getElementById('item-location').value.trim(),
                notes: document.getElementById('item-notes').value.trim(),
            };
            if (!body.title) return;

            const endpoint = isOwner
                ? `/api/trips/${tripId}/itinerary`
                : `/api/trips/${tripId}/requests`;

            const res = await fetch(endpoint, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (data.success) {
                closeAddItem();
                renderItinerary(data.trip.itinerary || []);
                renderRequests(data.trip.itineraryRequests || []);
            }
        });

        async function removeItem(itemId) {
            const res = await fetch(`/api/trips/${tripId}/itinerary/${itemId}`, {
                method: 'DELETE',
                headers: authHeaders,
            });
            const data = await res.json();
            if (data.success) renderItinerary(data.trip.itinerary || []);
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;
            input.value = '';
            addMessage(message, true);

            try {
                const res = await fetch(`/api/trips/${tripId}/chat`, {
                    method: 'POST',
                    headers: authHeaders,
                    body: JSON.stringify({ message }),
                });
                const data = await res.json();
                addMessage(data.response || 'Sorry, I encountered an error.', false);
                if (data.trip) {
                    renderItinerary(data.trip.itinerary || []);
                    renderWishlist(data.trip.wishlist || []);
                    renderRequests(data.trip.itineraryRequests || []);
                }
            } catch {
                addMessage("Sorry, I'm having trouble connecting.", false);
            }
        }

        document.getElementById('send-button').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        loadTrip();
        loadMessages();
    </script>
</body>
</html>
