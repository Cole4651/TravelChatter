<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Chatter - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">
            <h1><a href="index.html" class="brand-link">Travel Chatter</a></h1>
            <p>The Intelligent Travel Companion</p>
        </div>
        <h2>Sign In</h2>
        <div id="error-message" class="error-message hidden"></div>
        <input id="email" type="email" placeholder="Email" autocomplete="email">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button id="login-button">Sign In</button>
        <p class="auth-link">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
    <script>
        if (localStorage.getItem('authToken')) {
            window.location.href = 'trips.html';
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            errorEl.classList.add('hidden');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success && data.token) {
                localStorage.setItem('authToken', data.token);
                window.location.href = 'trips.html';
            } else {
                errorEl.textContent = data.error || 'Login failed.';
                errorEl.classList.remove('hidden');
            }
        }

        document.getElementById('login-button').addEventListener('click', handleLogin);
        document.getElementById('password').addEventListener('keypress', e => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
